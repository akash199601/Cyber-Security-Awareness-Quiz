{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }

        p {
            margin: 0;
            color: #c52167;
        }

        body {
            height: auto;
            width: 100%;
            padding: 10px;
            background-image: url("{% static 'image1.png' %}");
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-size: cover;
        }

        .container {
            margin-left: 15%;
            margin-right: 15%;
            margin-top: 100px;
            padding: 20px 15px;
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 10px;
            height: 850px;
        }

        @media(max-width: 460px) {
            .container {
                margin: 100px auto;
            }
        }

        label.box {
            display: flex;
            margin-top: 10px;
            padding: 10px 12px;
            border-radius: 5px;
            cursor: pointer;
            border: 1px solid black;
            background-color: white;
        }

        input[type="radio"] {
            display: none;
        }

        input[type="radio"]:checked+label {
            border-color: #8e498e;
        }

        input[type="radio"]:checked+label .circle {
            border: 6px solid #8e498e;
            background-color: #fff;
        }

        label.box:hover {
            background: #d5bbf7;
        }

        label.box .course {
            display: flex;
            align-items: center;
            width: 100%;
        }

        label.box .circle {
            height: 22px;
            width: 22px;
            border-radius: 50%;
            margin-right: 15px;
            border: 2px solid #ddd;
            display: inline-block;
        }

        label.box .subject {
            color: black;
            font-size: 16px;
        }

        .btn.btn-primary {
            border-radius: 25px;
            margin-top: 20px;
        }

        @media(max-width: 450px) {
            .subject {
                font-size: 12px;
            }
        }

        form {
            height: 85%;
            overflow-x: hidden;
        }
    </style>
    <script language='javascript' type='text/javascript'>
        function DisableBackButton() {
            window.history.forward()
        }
        DisableBackButton();
        window.onload = DisableBackButton;
        window.onpageshow = function (evt) {
            if (evt.persisted) DisableBackButton()
        }
        window.onunload = function () { void (0) }

    </script>
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',  // Default language of your page
                includedLanguages: 'en,hi',  // Languages you want to include, add more if needed
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript"
        src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</head>

<body>
    <header class="bg-white shadow-sm px-4 fixed-top" style="height: 75px; display: flex; align-items: center;">
        <div class="d-flex justify-content-between align-items-center w-100 max-width-container mx-auto">
            <div class="logo">
                <img src="{% static 'BSS LOGO.jpg' %}" alt="Sonata Finance" style="max-height: 65px; width: auto;">
            </div>

            {% if request.session.employee_id %}
            <div class="user-details d-flex align-items-center">
                <div class="text-end me-3 d-none d-sm-block">
                    <div class="fw-bold text-dark small" style="line-height: 1.2;">{{ request.session.name }}</div>
                    <div class="text-muted" style="font-size: 0.75rem;">ID: {{ request.session.employee_id }}</div>
                </div>
                <div class="dropdown">
                    <a class="d-flex align-items-center text-decoration-none dropdown-toggle text-dark" href="#"
                        role="button" id="userDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                        <div class="avatar bg-primary text-white rounded-circle d-flex align-items-center justify-content-center shadow-sm"
                            style="width: 38px; height: 38px;">
                            <i class="fas fa-user small"></i>
                        </div>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end shadow border-0" aria-labelledby="userDropdown">
                        <li class="px-3 py-2 border-bottom d-sm-none">
                            <div class="fw-bold">{{ request.session.name }}</div>
                            <div class="small text-muted">ID: {{ request.session.employee_id }}</div>
                        </li>
                        <li><a class="dropdown-item py-2" href="{% url 'logout' %}"><i
                                    class="fas fa-sign-out-alt me-2 text-danger"></i>Logout</a></li>
                    </ul>
                </div>
            </div>
            {% endif %}
        </div>
    </header>

    <div id="google_translate_element" style="position: fixed; top: 70px; right: 20px; z-index: 1000;"></div>

    {% block main_content %}

    {% endblock main_content%}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
